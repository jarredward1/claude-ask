<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Claude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #181c27;
      --border:    #2a2f42;
      --gold:      #c9a84c;
      --gold-dim:  rgba(201,168,76,0.15);
      --text:      #e8e4dc;
      --muted:     #6b7280;
      --green:     #28c840;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Inter', sans-serif;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 80px;
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 48px;
      opacity: 0.75;
    }

    .card {
      width: 100%;
      max-width: 1020px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: visible;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
      border-radius: 10px 10px 0 0;
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #febc2e; }
    .dot-g { background: #28c840; }

    .card-label {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── prompt block ── */
    .prompt-block {
      padding: 22px 24px;
      border-bottom: 1px solid var(--border);
    }

    .prompt-eyebrow {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #prompt-text {
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 4px;
    }

    /* ── action block ── */
    .action-block {
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .status {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .status-dot.ready { background: var(--green); }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 12px 20px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--gold);
      color: #0f1117;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

    /* ── no-query state ── */
    #no-query {
      display: none;
      padding: 48px 24px;
      text-align: center;
    }

    #no-query p {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      line-height: 1.8;
    }

    #no-query code {
      background: var(--gold-dim);
      color: var(--gold);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12px;
    }

    .footer {
      margin-top: 32px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }

    .copied-toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--green);
      color: #0f1117;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 10px 20px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }

    .copied-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="wordmark">Claude Query Terminal</div>

  <div class="card">
    <div class="card-header">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <span class="card-label">ask.html</span>
    </div>

    <div id="main-content" style="display:none;">
      <div class="prompt-block">
        <div class="prompt-eyebrow">Prompt</div>
        <div id="prompt-text"></div>
      </div>

      <div class="action-block">
        <div class="status">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-label">Preparing prompt...</span>
        </div>
        <div class="buttons">
          <button class="btn btn-primary" id="copy-btn" onclick="copyPrompt()">Copy Prompt</button>
          <a class="btn btn-secondary" href="https://claude.ai" target="_blank" id="claude-btn">Open Claude.ai →</a>
        </div>
      </div>
    </div>

    <div id="no-query">
      <p>No prompt detected.<br/>Add a <code>?q=your+prompt</code> parameter to the URL.</p>
    </div>
  </div>

  <div class="footer">
    Claude Query Terminal · Prompts are never stored or transmitted<br/>
    Everything stays in your browser
  </div>

  <div class="copied-toast" id="toast">Copied to clipboard</div>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const prompt  = params.get('q') || '';

    const mainContent = document.getElementById('main-content');
    const noQuery     = document.getElementById('no-query');
    const promptText  = document.getElementById('prompt-text');
    const statusDot   = document.getElementById('status-dot');
    const statusLabel = document.getElementById('status-label');
    const toast       = document.getElementById('toast');

    if (!prompt.trim()) {
      noQuery.style.display = 'block';
    } else {
      mainContent.style.display = 'block';
      promptText.textContent = prompt;

      // Auto-copy on load
      copyPrompt(true);
    }

    async function copyPrompt(silent) {
      try {
        await navigator.clipboard.writeText(prompt);
        statusDot.classList.add('ready');
        statusLabel.textContent = 'Prompt copied to clipboard — paste it into Claude.ai';

        if (!silent) {
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 2000);
        }
      } catch (err) {
        // Fallback for browsers that block auto-copy
        statusDot.style.background = '#febc2e';
        statusLabel.textContent = 'Click "Copy Prompt" to copy, then paste into Claude.ai';
      }
    }
  </script>
</body>
</html>
